apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: image-app-backend:latest
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - mountPath: /data/images
          name: image-storage
      volumes:
      - name: image-storage
        persistentVolumeClaim:
          claimName: image-pvc